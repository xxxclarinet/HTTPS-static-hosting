<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>班次邮件分发助手</title>
    <link rel="stylesheet" href="taskpane.css" />
    <!-- Office.js 由微软 CDN 提供，本机/托管都不需要打包 -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <header>
      <h1>班次邮件分发助手</h1>
      <p id="mode-hint" class="hint">正在初始化…</p>
    </header>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <!-- 读模式：在源班次邮件上解析、生成分发清单 -->
    <section id="read-panel" class="panel hidden">
      <p class="hint">
        在打开的 <b>源班次邮件</b> 上点击下方按钮，解析每位组员与对应班次图，生成分发清单。
      </p>
      <button id="btn-parse" class="primary">解析源邮件</button>

      <div id="cycle-info" class="cycle-info hidden"></div>

      <div id="rows" class="rows"></div>
      <div id="anomalies" class="anomalies"></div>

      <button id="btn-save" class="primary hidden">保存为分发清单</button>
    </section>

    <!-- 撰写模式：把清单逐封填充进新邮件 -->
    <section id="compose-panel" class="panel hidden">
      <p class="hint">
        在 <b>新建的空白邮件</b> 里点击下方按钮，自动填好收件人/主题/正文并内嵌班次图，
        然后按 <b>Ctrl+S</b> 存为草稿。重复直到清单清空。
      </p>
      <div id="compose-status"></div>
      <button id="btn-fill-next" class="primary">填充当前邮件（下一位）</button>
      <div id="pending-list" class="rows"></div>
      <button id="btn-clear-plan" class="ghost">清空分发清单</button>
    </section>

    <!-- 设置 -->
    <section id="settings" class="panel">
      <details>
        <summary>配置（域名 / 主题 / 正文 / 落款）</summary>
        <label>邮件域名
          <input id="cfg-domain" type="text" />
        </label>
        <label>主题模板（可用 {cycle} {login}）
          <input id="cfg-subject" type="text" />
        </label>
        <label>正文主体（HTML）
          <textarea id="cfg-body" rows="3"></textarea>
        </label>
        <label>落款（HTML）
          <textarea id="cfg-sign" rows="2"></textarea>
        </label>
        <label class="row-check">
          <input id="cfg-year" type="checkbox" /> 周期显示带年份
        </label>
        <button id="btn-save-config" class="ghost">保存配置</button>
      </details>
    </section>

    <script type="module" src="taskpane.js"></script>
  </body>
</html>
